<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>8RB Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"
  }
}
</script>
<style>
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#f0f0f0;margin:0;padding:0;min-height:100vh;}
.admin-loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:var(--dim);}
#admin-ui{display:none;max-width:600px;margin:0 auto;padding:24px 20px 60px;}
.admin-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.admin-ttl{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:#fff;}
.admin-user{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);}
.admin-signout{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;}
.admin-section{margin-bottom:40px;}
.admin-section-ttl{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:#fff;margin-bottom:4px;}
.admin-section-hr{border:none;border-top:1px solid var(--border);margin:0 0 16px;}
.admin-textarea{width:100%;min-height:200px;background:#1e1e1e;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;padding:14px;box-sizing:border-box;resize:vertical;outline:none;}
.admin-textarea:focus{border-color:var(--accent);}
.admin-charcount{font-size:12px;color:var(--dim);text-align:right;margin-top:6px;}
.admin-meta{font-size:12px;color:var(--dim);margin-top:8px;margin-bottom:16px;}
.admin-save{display:block;width:100%;height:56px;background:var(--accent);border:none;border-radius:var(--rs);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;cursor:pointer;}
.admin-save:disabled{opacity:0.5;cursor:default;}
.admin-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;padding:12px 24px;border-radius:8px;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.admin-toast.show{opacity:1;}
.admin-toast.err{background:var(--red);color:#fff;}
/* Member cards */
.member-card{background:#141414;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.member-info{flex:1;min-width:0;}
.member-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);}
.member-email{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-joined{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--dim);}
.role-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.role-member{background:var(--border);color:var(--muted);}
.role-sgpt{background:rgba(230,168,23,0.2);color:var(--gold);}
.role-coach{background:var(--accent);color:#fff;}
.role-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;min-height:36px;}
.role-btn-assign{background:none;border:1px solid var(--gold);color:var(--gold);}
.role-btn-remove{background:none;border:1px solid var(--border);color:var(--dim);}
/* Form elements */
.admin-form-lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.admin-select{width:100%;background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;margin-bottom:14px;-webkit-appearance:none;}
.admin-date-inp{width:100%;background:#1e1e1e;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;margin-bottom:14px;box-sizing:border-box;color-scheme:dark;}
.send-toggle{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.send-opt{flex:1;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-align:center;background:none;border:none;color:var(--dim);cursor:pointer;}
.send-opt.on{background:var(--accent);color:#fff;}
.member-check{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);}
.member-check:last-child{border-bottom:none;}
.member-check input{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;}
/* History table */
.hist-table{width:100%;border-collapse:collapse;margin-top:12px;}
.hist-table th{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
.hist-table td{font-size:13px;color:var(--muted);padding:8px 8px;border-bottom:1px solid var(--border2);vertical-align:top;}
.hist-status-done{color:var(--green);font-weight:600;}
.hist-status-pending{color:var(--dim);}
.hist-status-expired{color:var(--red);}
/* Session builder */
.sb-name-inp{width:100%;height:56px;background:#1e1e1e;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:0 16px;box-sizing:border-box;outline:none;margin-bottom:16px;}
.sb-name-inp:focus{border-color:var(--accent);}
.sb-exercise-row{background:#141414;border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:8px;}
.sb-ex-name{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.sb-ex-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.sb-field{display:flex;flex-direction:column;}
.sb-ex-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;}
.sb-num-inp{width:64px;height:40px;background:#252525;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;text-align:center;padding:0 8px;outline:none;box-sizing:border-box;}
.sb-sel{height:40px;background:#252525;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:0 8px;outline:none;-webkit-appearance:none;cursor:pointer;}
.sb-remove-btn{height:40px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:18px;cursor:pointer;padding:0 12px;margin-left:auto;}
.sb-add-btn{width:100%;height:48px;background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-bottom:16px;}
.sb-search-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9000;display:none;flex-direction:column;padding:24px 16px;box-sizing:border-box;}
.sb-search-overlay.show{display:flex;}
.sb-search-inp{width:100%;height:52px;background:#1e1e1e;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:0 16px;box-sizing:border-box;outline:none;margin-bottom:12px;flex-shrink:0;}
.sb-search-inp:focus{border-color:var(--accent);}
.sb-search-results{flex:1;overflow-y:auto;}
.sb-search-item{padding:14px 4px;border-bottom:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);cursor:pointer;}
.sb-search-cancel{width:100%;height:52px;background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;flex-shrink:0;}
.sb-sess-card{background:#141414;border:1px solid var(--border);border-radius:var(--rs);padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.sb-sess-info{flex:1;min-width:0;}
.sb-sess-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);}
.sb-sess-count{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);}
.sb-sess-btns{display:flex;gap:8px;flex-shrink:0;}
.sb-assign-btn{background:none;border:1px solid var(--accent);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;}
.sb-archive-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;}
.sb-archive-toggle{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.3);cursor:pointer;padding:6px 0;text-decoration:underline;display:block;margin:0 auto;}
</style>
</head>
<body>
<div class="admin-loading" id="admin-loading">Checking access…</div>

<div id="admin-ui">
  <div class="admin-hd">
    <div>
      <div class="admin-ttl">8RB ADMIN</div>
      <div class="admin-user" id="admin-user-name">Signed in as —</div>
    </div>
    <button class="admin-signout" onclick="adminSignOut()">SIGN OUT</button>
  </div>

  <!-- COACH'S NOTES (existing) -->
  <div class="admin-section">
    <div class="admin-section-ttl">COACH'S NOTES</div>
    <hr class="admin-section-hr">
    <textarea class="admin-textarea" id="coach-notes-ta" maxlength="1000" oninput="updateCharCount()" placeholder="Write your notes for members here…"></textarea>
    <div class="admin-charcount"><span id="char-count">0</span> / 1000</div>
    <div class="admin-meta" id="coach-notes-meta">Last updated: —</div>
    <button class="admin-save" id="coach-notes-save" onclick="saveCoachNotes()">SAVE CHANGES</button>
  </div>

  <!-- MEMBERS -->
  <div class="admin-section">
    <div class="admin-section-ttl">MEMBERS</div>
    <hr class="admin-section-hr">
    <div id="members-list"><div style="color:var(--dim);font-size:13px">Loading members…</div></div>
  </div>

  <!-- SESSION BUILDER -->
  <div class="admin-section">
    <div class="admin-section-ttl">SESSION BUILDER</div>
    <hr class="admin-section-hr">
    <input class="sb-name-inp" id="sb-session-name" type="text" placeholder="Name this session" oninput="checkSbReady()">
    <div id="sb-exercise-list"></div>
    <button class="sb-add-btn" onclick="openExerciseSearch()">+ ADD EXERCISE</button>
    <button class="admin-save" id="sb-save-btn" onclick="saveAdminSession()" disabled>SAVE SESSION</button>
    <div style="margin-top:32px">
      <div class="admin-form-lbl" style="font-size:13px;margin-bottom:12px">SAVED SESSIONS</div>
      <div id="sb-sessions-list"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
    </div>
  </div>

  <!-- ASSIGN SESSION -->
  <div class="admin-section">
    <div class="admin-section-ttl">ASSIGN SESSION</div>
    <hr class="admin-section-hr">
    <div class="admin-form-lbl">Session</div>
    <select class="admin-select" id="assign-session-select">
      <option value="">Select a session</option>
    </select>
    <div class="admin-form-lbl">For date</div>
    <input class="admin-date-inp" type="date" id="assign-date">
    <div class="admin-form-lbl">Send to</div>
    <div class="send-toggle">
      <button class="send-opt on" id="send-all-btn" onclick="setSendMode('all')">ALL SGPT MEMBERS</button>
      <button class="send-opt" id="send-specific-btn" onclick="setSendMode('specific')">SPECIFIC MEMBERS</button>
    </div>
    <div id="member-checklist" style="display:none;background:#141414;border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:14px"></div>
    <button class="admin-save" id="assign-btn" onclick="assignSession()" disabled>ASSIGN</button>
    <div style="margin-top:32px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="admin-form-lbl" style="margin:0">RECENT ASSIGNMENTS</div>
        <button onclick="loadAssignmentHistory()" style="background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer">↻ Refresh</button>
      </div>
      <div id="assignment-history"><div style="color:var(--dim);font-size:13px">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Exercise search overlay -->
<div class="sb-search-overlay" id="sb-search-overlay">
  <input class="sb-search-inp" id="sb-search-inp" type="text" placeholder="Search exercises…" oninput="filterExerciseSearch()">
  <div class="sb-search-results" id="sb-search-results"></div>
  <button class="sb-search-cancel" onclick="closeExerciseSearch()">CANCEL</button>
</div>

<div class="admin-toast" id="admin-toast"></div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged, signOut } from 'firebase/auth';
import { doc, getDoc, getDocs, setDoc, addDoc, collection, serverTimestamp, updateDoc, query, where } from 'firebase/firestore';
import { EXERCISE_LIBRARY } from './data.js';

var currentCoach = null;
var allMembers = [];
var sendMode = 'all';
var sbExercises = [];
var adminSgptSessions = [];
var adminArchivedSessions = [];
var showArchived = false;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr) {
  var t = document.getElementById('admin-toast');
  t.textContent = msg;
  t.className = 'admin-toast' + (isErr ? ' err' : '') + ' show';
  setTimeout(function(){ t.className = 'admin-toast' + (isErr ? ' err' : ''); }, 2400);
}

function fmtDate(ts) {
  if (!ts) return '—';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}

function fmtDateStr(str) {
  if (!str) return '—';
  var d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}

function sanitise(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── COACH'S NOTES ────────────────────────────────────────────────────────────
async function loadCoachNotes() {
  try {
    var snap = await getDoc(doc(db, 'gym', '8RB', 'config', 'main'));
    if (snap.exists()) {
      var data = snap.data();
      document.getElementById('coach-notes-ta').value = data.coachNotes || '';
      updateCharCount();
      var meta = document.getElementById('coach-notes-meta');
      if (data.coachNotesUpdatedAt) {
        meta.textContent = 'Last updated: ' + fmtDate(data.coachNotesUpdatedAt) + (data.coachNotesUpdatedBy ? ' by ' + data.coachNotesUpdatedBy : '');
      }
    }
  } catch(err) { console.warn('Failed to load coach notes:', err); }
}

window.updateCharCount = function() {
  var val = document.getElementById('coach-notes-ta').value;
  document.getElementById('char-count').textContent = val.length;
};

window.saveCoachNotes = async function() {
  var notes = document.getElementById('coach-notes-ta').value;
  var btn = document.getElementById('coach-notes-save');
  btn.disabled = true; btn.textContent = 'SAVING…';
  try {
    await setDoc(doc(db, 'gym', '8RB', 'config', 'main'), {
      coachNotes: notes,
      coachNotesUpdatedAt: serverTimestamp(),
      coachNotesUpdatedBy: currentCoach ? (currentCoach.displayName || currentCoach.email) : 'coach'
    }, { merge: true });
    document.getElementById('coach-notes-meta').textContent = 'Last updated: just now by ' + (currentCoach ? (currentCoach.displayName || currentCoach.email) : 'coach');
    showToast('COACH\'S NOTES UPDATED');
  } catch(err) {
    console.error('Save failed:', err);
    showToast('SAVE FAILED — TRY AGAIN', true);
  } finally {
    btn.disabled = false; btn.textContent = 'SAVE CHANGES';
  }
};

// ─── MEMBERS ──────────────────────────────────────────────────────────────────
async function loadMembers() {
  try {
    var snap = await getDocs(collection(db, 'gym', '8RB', 'members'));
    allMembers = snap.docs.map(function(d) { return Object.assign({ uid: d.id }, d.data()); });
    renderMembers();
    populateMemberChecklist();
  } catch(err) {
    document.getElementById('members-list').innerHTML = '<div style="color:var(--red);font-size:13px">Failed to load members.</div>';
  }
}

function renderMembers() {
  var list = document.getElementById('members-list');
  if (!allMembers.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:13px">No members yet.</div>';
    return;
  }
  list.innerHTML = allMembers.map(function(m) {
    var badgeCls = m.role === 'coach' ? 'role-coach' : m.sgpt === true ? 'role-sgpt' : 'role-member';
    var badgeTxt = m.role === 'coach' ? 'COACH' : m.sgpt === true ? 'SGPT' : 'MEMBER';
    var actionBtn = '';
    if (currentCoach && m.uid !== currentCoach.uid && m.role !== 'coach') {
      if (m.sgpt === true) {
        actionBtn = '<button class="role-btn role-btn-remove" onclick="toggleSgpt(\'' + m.uid + '\',false)">REMOVE SGPT</button>';
      } else {
        actionBtn = '<button class="role-btn role-btn-assign" onclick="toggleSgpt(\'' + m.uid + '\',true)">ASSIGN SGPT</button>';
      }
    }
    return '<div class="member-card" id="mcard-' + m.uid + '">'
      + '<div class="member-info">'
        + '<div class="member-name">' + sanitise(m.displayName || 'Unknown') + '</div>'
        + '<div class="member-email">' + sanitise(m.email || '') + '</div>'
        + '<div class="member-joined">Joined ' + fmtDate(m.joinDate) + '</div>'
      + '</div>'
      + '<span class="role-badge ' + badgeCls + '" id="badge-' + m.uid + '">' + badgeTxt + '</span>'
      + actionBtn
    + '</div>';
  }).join('');
}

window.toggleSgpt = async function(uid, grantSgpt) {
  try {
    await updateDoc(doc(db, 'users', uid, 'profile', 'data'), { sgpt: grantSgpt });
    await updateDoc(doc(db, 'gym', '8RB', 'members', uid), { sgpt: grantSgpt });
    var m = allMembers.find(function(x) { return x.uid === uid; });
    if (m) m.sgpt = grantSgpt;
    renderMembers();
    populateMemberChecklist();
    showToast(grantSgpt ? 'SGPT ACCESS GRANTED' : 'SGPT ACCESS REMOVED');
  } catch(err) {
    showToast('UPDATE FAILED — TRY AGAIN', true);
  }
};

// ─── ASSIGN SESSION ───────────────────────────────────────────────────────────
function populateSessionDropdown() {
  var sel = document.getElementById('assign-session-select');
  while (sel.options.length > 1) sel.remove(1);
  adminSgptSessions.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s._id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  if (!sel._changeListenerAdded) {
    sel.addEventListener('change', window.checkAssignReady);
    sel._changeListenerAdded = true;
  }
}

function setDefaultDate() {
  var today = new Date().toISOString().split('T')[0];
  var inp = document.getElementById('assign-date');
  inp.value = today;
  inp.min = today;
  inp.addEventListener('change', checkAssignReady);
}

window.setSendMode = function(mode) {
  sendMode = mode;
  document.getElementById('send-all-btn').classList.toggle('on', mode === 'all');
  document.getElementById('send-specific-btn').classList.toggle('on', mode === 'specific');
  document.getElementById('member-checklist').style.display = mode === 'specific' ? 'block' : 'none';
  checkAssignReady();
};

function populateMemberChecklist() {
  var sgpt = allMembers.filter(function(m) { return m.sgpt === true; });
  var cl = document.getElementById('member-checklist');
  if (!sgpt.length) {
    cl.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 0">No SGPT members yet.</div>';
    return;
  }
  cl.innerHTML = sgpt.map(function(m) {
    return '<div class="member-check">'
      + '<input type="checkbox" id="chk-' + m.uid + '" value="' + m.uid + '" onchange="checkAssignReady()">'
      + '<label for="chk-' + m.uid + '" style="font-family:\'DM Sans\',sans-serif;font-size:14px;cursor:pointer">'
        + sanitise(m.displayName || 'Unknown') + '<span style="color:var(--dim);font-size:12px;margin-left:6px">' + sanitise(m.email || '') + '</span>'
      + '</label>'
    + '</div>';
  }).join('');
}

window.checkAssignReady = function() {
  var sessOk = !!document.getElementById('assign-session-select').value;
  var dateOk = !!document.getElementById('assign-date').value;
  var recipientOk = sendMode === 'all'
    ? allMembers.some(function(m) { return m.sgpt === true; })
    : document.querySelectorAll('#member-checklist input:checked').length > 0;
  document.getElementById('assign-btn').disabled = !(sessOk && dateOk && recipientOk);
};

window.assignSession = async function() {
  var sessId = document.getElementById('assign-session-select').value;
  var forDate = document.getElementById('assign-date').value;
  var sess = adminSgptSessions.find(function(s) { return s._id === sessId; });
  if (!sess || !forDate) return;
  var recipients;
  if (sendMode === 'all') {
    recipients = allMembers.filter(function(m) { return m.sgpt === true; }).map(function(m) { return m.uid; });
  } else {
    recipients = Array.from(document.querySelectorAll('#member-checklist input:checked')).map(function(el) { return el.value; });
  }
  if (!recipients.length) { showToast('No recipients selected', true); return; }
  var btn = document.getElementById('assign-btn');
  btn.disabled = true; btn.textContent = 'ASSIGNING…';
  try {
    for (var i = 0; i < recipients.length; i++) {
      await addDoc(collection(db, 'users', recipients[i], 'assignedSessions'), {
        sessionData: sess,
        sessionName: sess.name,
        assignedBy: currentCoach.uid,
        assignedAt: serverTimestamp(),
        assignedFor: forDate,
        status: 'pending'
      });
    }
    showToast('SESSION ASSIGNED TO ' + recipients.length + ' MEMBER' + (recipients.length !== 1 ? 'S' : ''));
    document.getElementById('assign-session-select').value = '';
    document.getElementById('assign-date').value = new Date().toISOString().split('T')[0];
    setSendMode('all');
    checkAssignReady();
    loadAssignmentHistory();
  } catch(err) {
    showToast('ASSIGNMENT FAILED — TRY AGAIN', true);
  } finally {
    btn.textContent = 'ASSIGN';
    checkAssignReady();
  }
};

window.loadAssignmentHistory = async function() {
  var container = document.getElementById('assignment-history');
  container.innerHTML = '<div style="color:var(--dim);font-size:13px">Loading…</div>';
  try {
    var rows = [];
    for (var i = 0; i < allMembers.length; i++) {
      var m = allMembers[i];
      var snap = await getDocs(collection(db, 'users', m.uid, 'assignedSessions'));
      snap.docs.forEach(function(d) {
        rows.push(Object.assign({ uid: m.uid, memberName: m.displayName || m.email }, d.data()));
      });
    }
    rows.sort(function(a, b) {
      var at = a.assignedAt && a.assignedAt.toDate ? a.assignedAt.toDate().getTime() : 0;
      var bt = b.assignedAt && b.assignedAt.toDate ? b.assignedAt.toDate().getTime() : 0;
      return bt - at;
    });
    rows = rows.slice(0, 20);
    if (!rows.length) { container.innerHTML = '<div style="color:var(--dim);font-size:13px">No assignments yet.</div>'; return; }
    var html = '<table class="hist-table"><thead><tr><th>MEMBER</th><th>SESSION</th><th>DATE</th><th>STATUS</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      var statusHtml;
      if (r.status === 'completed') {
        statusHtml = '<span class="hist-status-done">✓ Done</span>';
        if (r.completedAt) statusHtml += '<div style="font-size:11px;color:var(--dim)">' + fmtDate(r.completedAt) + '</div>';
      } else if (r.status === 'expired') {
        statusHtml = '<span class="hist-status-expired">✕ Expired</span>';
      } else {
        statusHtml = '<span class="hist-status-pending">⏱ Pending</span>';
      }
      html += '<tr>'
        + '<td>' + sanitise(r.memberName || '') + '</td>'
        + '<td>' + sanitise(r.sessionName || '') + '</td>'
        + '<td>' + fmtDateStr(r.assignedFor) + '</td>'
        + '<td>' + statusHtml + '</td>'
      + '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch(err) {
    container.innerHTML = '<div style="color:var(--red);font-size:13px">Failed to load history.</div>';
  }
};

// ─── SESSION BUILDER ──────────────────────────────────────────────────────────
window.checkSbReady = function() {
  var name = (document.getElementById('sb-session-name').value || '').trim();
  document.getElementById('sb-save-btn').disabled = !(name && sbExercises.length > 0);
};

function renderSbExerciseList() {
  var el = document.getElementById('sb-exercise-list');
  if (!sbExercises.length) { el.innerHTML = ''; return; }
  var restOpts = [30,45,60,90,120].map(function(s) {
    return '<option value="' + s + '">'+s+'s</option>';
  }).join('');
  var typeOpts = ['Standard','Superset','AMRAP','Ladder','Pyramid'].map(function(t) {
    return '<option value="' + t + '">' + t + '</option>';
  }).join('');
  el.innerHTML = sbExercises.map(function(ex, i) {
    var restSelected = [30,45,60,90,120].map(function(s) {
      return '<option value="' + s + '"' + (ex.rest === s ? ' selected' : '') + '>' + s + 's</option>';
    }).join('');
    var typeSelected = ['Standard','Superset','AMRAP','Ladder','Pyramid'].map(function(t) {
      return '<option value="' + t + '"' + (ex.type === t ? ' selected' : '') + '>' + t + '</option>';
    }).join('');
    return '<div class="sb-exercise-row">' +
      '<div class="sb-ex-name"><span>' + sanitise(ex.name) + '</span>' +
        '<button class="sb-remove-btn" onclick="removeSbEx(' + i + ')">×</button></div>' +
      '<div class="sb-ex-controls">' +
        '<div class="sb-field"><label class="sb-ex-label">Sets</label>' +
          '<input class="sb-num-inp" type="number" min="1" max="20" value="' + ex.sets + '" oninput="updateSbEx(' + i + ',\'sets\',this.value)"></div>' +
        '<div class="sb-field"><label class="sb-ex-label">Reps</label>' +
          '<input class="sb-num-inp" type="number" min="1" max="100" value="' + ex.reps + '" oninput="updateSbEx(' + i + ',\'reps\',this.value)"></div>' +
        '<div class="sb-field"><label class="sb-ex-label">Rest</label>' +
          '<select class="sb-sel" onchange="updateSbEx(' + i + ',\'rest\',+this.value)">' + restSelected + '</select></div>' +
        '<div class="sb-field"><label class="sb-ex-label">Type</label>' +
          '<select class="sb-sel" onchange="updateSbEx(' + i + ',\'type\',this.value)">' + typeSelected + '</select></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

window.updateSbEx = function(i, field, val) {
  if (field === 'sets' || field === 'reps' || field === 'rest') {
    sbExercises[i][field] = +val || sbExercises[i][field];
  } else {
    sbExercises[i][field] = val;
  }
  window.checkSbReady();
};

window.removeSbEx = function(i) {
  sbExercises.splice(i, 1);
  renderSbExerciseList();
  window.checkSbReady();
};

window.openExerciseSearch = function() {
  document.getElementById('sb-search-inp').value = '';
  filterExerciseSearch();
  document.getElementById('sb-search-overlay').classList.add('show');
  document.getElementById('sb-search-inp').focus();
};

window.closeExerciseSearch = function() {
  document.getElementById('sb-search-overlay').classList.remove('show');
};

window.filterExerciseSearch = function() {
  var q = (document.getElementById('sb-search-inp').value || '').toLowerCase();
  var results = q
    ? EXERCISE_LIBRARY.filter(function(ex) { return ex.name.toLowerCase().includes(q); })
    : EXERCISE_LIBRARY;
  document.getElementById('sb-search-results').innerHTML = results.map(function(ex) {
    var escaped = ex.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<div class="sb-search-item" onclick="addSbExercise(\'' + escaped + '\')">' + sanitise(ex.name) + '</div>';
  }).join('');
};

window.addSbExercise = function(name) {
  sbExercises.push({ name: name, sets: 3, reps: 8, rest: 60, type: 'Standard' });
  renderSbExerciseList();
  window.closeExerciseSearch();
  window.checkSbReady();
};

window.saveAdminSession = async function() {
  var name = (document.getElementById('sb-session-name').value || '').trim();
  if (!name || !sbExercises.length) return;
  var btn = document.getElementById('sb-save-btn');
  btn.disabled = true; btn.textContent = 'SAVING…';
  try {
    var exercises = sbExercises.map(function(ex) {
      return { name: ex.name, displayName: ex.name, sets: ex.sets, reps: ex.reps,
               scheme: ex.sets + '×' + ex.reps, rest: ex.rest, type: ex.type, note: '', alts: [] };
    });
    await addDoc(collection(db, 'gym', '8RB', 'sgptSessions'), {
      name: name, exercises: exercises,
      createdAt: serverTimestamp(),
      createdBy: currentCoach ? currentCoach.uid : '',
      active: true, audience: ['sgpt'], source: 'coach'
    });
    showToast('SESSION SAVED');
    document.getElementById('sb-session-name').value = '';
    sbExercises = [];
    renderSbExerciseList();
    window.checkSbReady();
    await loadSgptSessions();
  } catch(err) {
    showToast('SAVE FAILED — TRY AGAIN', true);
  } finally {
    btn.textContent = 'SAVE SESSION';
    window.checkSbReady();
  }
};

async function loadSgptSessions() {
  try {
    var snap = await getDocs(collection(db, 'gym', '8RB', 'sgptSessions'));
    var all = snap.docs.map(function(d) { return Object.assign({ _id: d.id }, d.data()); });
    adminSgptSessions = all.filter(function(s) { return s.active !== false; });
    adminArchivedSessions = all.filter(function(s) { return s.active === false; });
    renderSgptSessionsList();
    populateSessionDropdown();
  } catch(err) {
    document.getElementById('sb-sessions-list').innerHTML = '<div style="color:var(--dim);font-size:13px">Failed to load sessions.</div>';
  }
}

function renderSgptSessionsList() {
  var el = document.getElementById('sb-sessions-list');
  var activeHtml = adminSgptSessions.length
    ? adminSgptSessions.map(function(sess) {
        var n = (sess.exercises || []).length;
        var esc = sess._id.replace(/'/g, "\\'");
        return '<div class="sb-sess-card">' +
          '<div class="sb-sess-info">' +
            '<div class="sb-sess-name">' + sanitise(sess.name) + '</div>' +
            '<div class="sb-sess-count">' + n + (n === 1 ? ' exercise' : ' exercises') + '</div>' +
          '</div>' +
          '<div class="sb-sess-btns">' +
            '<button class="sb-assign-btn" onclick="preSelectSession(\'' + esc + '\')">ASSIGN</button>' +
            '<button class="sb-archive-btn" onclick="archiveSgptSession(\'' + esc + '\')">ARCHIVE</button>' +
          '</div>' +
        '</div>';
      }).join('')
    : '<div style="color:var(--dim);font-size:13px;padding:8px 0">No sessions yet. Build your first one above.</div>';

  var archivedHtml = '';
  if (adminArchivedSessions.length) {
    archivedHtml += '<div style="text-align:center;padding:12px 0 4px">' +
      '<button class="sb-archive-toggle" onclick="toggleArchivedSessions()">' +
        (showArchived ? 'Hide archived' : 'Show archived (' + adminArchivedSessions.length + ')') +
      '</button></div>';
    if (showArchived) {
      archivedHtml += adminArchivedSessions.map(function(sess) {
        var n = (sess.exercises || []).length;
        var esc = sess._id.replace(/'/g, "\\'");
        return '<div class="sb-sess-card" style="opacity:0.45">' +
          '<div class="sb-sess-info">' +
            '<div class="sb-sess-name">' + sanitise(sess.name) + '</div>' +
            '<div class="sb-sess-count">' + n + (n === 1 ? ' exercise' : ' exercises') + '</div>' +
          '</div>' +
          '<div class="sb-sess-btns">' +
            '<button class="sb-archive-btn" style="border-color:var(--green);color:var(--green)" ' +
              'onclick="unarchiveSgptSession(\'' + esc + '\')">UNARCHIVE</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  }

  el.innerHTML = activeHtml + archivedHtml;
}

window.archiveSgptSession = async function(id) {
  try {
    await updateDoc(doc(db, 'gym', '8RB', 'sgptSessions', id), { active: false });
    var sess = adminSgptSessions.find(function(s) { return s._id === id; });
    if (sess) {
      sess.active = false;
      adminSgptSessions = adminSgptSessions.filter(function(s) { return s._id !== id; });
      adminArchivedSessions.push(sess);
    }
    renderSgptSessionsList();
    populateSessionDropdown();
    showToast('SESSION ARCHIVED');
  } catch(err) { showToast('ARCHIVE FAILED — TRY AGAIN', true); }
};

window.unarchiveSgptSession = async function(id) {
  try {
    await updateDoc(doc(db, 'gym', '8RB', 'sgptSessions', id), { active: true });
    var sess = adminArchivedSessions.find(function(s) { return s._id === id; });
    if (sess) {
      sess.active = true;
      adminArchivedSessions = adminArchivedSessions.filter(function(s) { return s._id !== id; });
      adminSgptSessions.push(sess);
    }
    renderSgptSessionsList();
    populateSessionDropdown();
    showToast('SESSION RESTORED');
  } catch(err) { showToast('RESTORE FAILED — TRY AGAIN', true); }
};

window.toggleArchivedSessions = function() {
  showArchived = !showArchived;
  renderSgptSessionsList();
};

window.preSelectSession = function(id) {
  var sel = document.getElementById('assign-session-select');
  sel.value = id;
  sel.dispatchEvent(new Event('change'));
  document.querySelector('.admin-section:last-of-type').scrollIntoView({ behavior: 'smooth', block: 'start' });
  window.checkAssignReady();
};

// ─── SIGN OUT ─────────────────────────────────────────────────────────────────
window.adminSignOut = async function() {
  try { await signOut(auth); window.location.href = 'index.html'; } catch(e) {}
};

// ─── AUTH GATE ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async function(user) {
  var loading = document.getElementById('admin-loading');
  var ui = document.getElementById('admin-ui');
  if (!user) { window.location.href = 'index.html'; return; }
  try {
    var profileSnap = await getDoc(doc(db, 'users', user.uid, 'profile', 'data'));
    if (!profileSnap.exists() || profileSnap.data().role !== 'coach') {
      loading.textContent = 'Access denied.';
      setTimeout(function(){ window.location.href = 'index.html'; }, 1500);
      return;
    }
    currentCoach = user;
    loading.style.display = 'none';
    ui.style.display = 'block';
    document.getElementById('admin-user-name').textContent = 'Signed in as ' + (user.displayName || user.email);
    setDefaultDate();
    await loadCoachNotes();
    await loadMembers();
    await loadSgptSessions();
    await loadAssignmentHistory();
  } catch(err) {
    loading.textContent = 'Error checking access. Please try again.';
    console.error(err);
  }
});
</script>
