<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>8RB Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"
  }
}
</script>
<style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

/* ── Gate / loading ─────────────────────────────────────────────────────────── */
#admin-gate { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--dim, #555); }

/* ── Shell ──────────────────────────────────────────────────────────────────── */
#admin-shell { flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Header ─────────────────────────────────────────────────────────────────── */
#admin-header { height: 64px; background: #111; border-bottom: 1px solid var(--border, #222); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; z-index: 100; }
.header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: #fff; }
.header-right { display: flex; align-items: center; gap: 14px; }
.header-coach { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted, #888); }
.header-signout { background: none; border: 1px solid var(--border, #222); border-radius: 4px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 14px; cursor: pointer; }
.header-signout:hover { border-color: var(--accent, #E63946); color: var(--accent, #E63946); }

/* ── Body layout ────────────────────────────────────────────────────────────── */
#admin-body { display: flex; height: calc(100vh - 64px); overflow: hidden; }

/* ── Sidebar ────────────────────────────────────────────────────────────────── */
#admin-sidebar { width: 220px; flex-shrink: 0; background: #0d0d0d; border-right: 1px solid var(--border, #222); padding: 20px 0; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.nav-item { display: flex; align-items: center; padding: 12px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted, #888); background: none; border: none; cursor: pointer; text-align: left; width: 100%; transition: background 0.12s, color 0.12s; letter-spacing: 0.3px; }
.nav-item:hover { background: rgba(255,255,255,0.04); color: #f0f0f0; }
.nav-item.active { background: rgba(230,57,70,0.1); color: var(--accent, #E63946); font-weight: 600; border-left: 3px solid var(--accent, #E63946); padding-left: 21px; }

/* ── Main content ───────────────────────────────────────────────────────────── */
#admin-main { flex: 1; overflow-y: auto; padding: 32px; min-width: 0; }
.admin-section-panel { max-width: 1200px; }
.section-hd { margin-bottom: 24px; }
.section-ttl { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: #fff; line-height: 1; }
.section-sub { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--dim, #555); margin-top: 4px; }

/* ── Dashboard ──────────────────────────────────────────────────────────────── */
.dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #141414; border: 1px solid var(--border, #222); border-radius: 10px; padding: 20px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #fff; line-height: 1; }
.stat-val.gold { color: var(--gold, #E6A817); }
.stat-lbl { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); margin-top: 6px; }
.dash-section { margin-bottom: 32px; }
.quick-actions { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
.quick-btn { background: none; border: 1px solid var(--border, #222); border-radius: 8px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 12px 20px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.quick-btn:hover { border-color: var(--accent, #E63946); color: var(--accent, #E63946); }
.dash-breakdown { display: flex; gap: 16px; margin-top: 14px; }
.breakdown-card { flex: 1; background: #141414; border: 1px solid var(--border, #222); border-radius: 10px; padding: 20px; }
.breakdown-val { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; }
.breakdown-lbl { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); margin-top: 4px; }

/* ── Members table ──────────────────────────────────────────────────────────── */
.members-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.search-inp { flex: 1; min-width: 200px; height: 40px; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 0 12px; outline: none; }
.search-inp:focus { border-color: var(--accent, #E63946); }
.filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: none; border: 1px solid var(--border, #222); border-radius: 20px; color: var(--dim, #555); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; cursor: pointer; transition: all 0.12s; }
.filter-btn.active { background: var(--accent, #E63946); border-color: var(--accent, #E63946); color: #fff; }
.table-wrap { overflow-x: auto; }
.members-table { width: 100%; border-collapse: collapse; }
.members-table th { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border, #222); }
.members-table td { padding: 12px 12px; border-bottom: 1px solid var(--border2, #1a1a1a); vertical-align: middle; }
.mem-name { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #f0f0f0; }
.mem-email { font-size: 12px; color: var(--dim, #555); margin-top: 2px; }
.mem-joined { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted, #888); }
.role-badge { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; white-space: nowrap; display: inline-block; }
.role-member { background: var(--border, #222); color: var(--muted, #888); }
.role-sgpt { background: rgba(230,168,23,0.2); color: var(--gold, #E6A817); }
.role-pt121 { background: rgba(69,123,157,0.2); color: var(--blue, #457B9D); }
.role-coach { background: var(--accent, #E63946); color: #fff; }
.tbl-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.tbl-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
.tbl-btn-assign { background: none; border: 1px solid var(--gold, #E6A817); color: var(--gold, #E6A817); }
.tbl-btn-assign2 { background: none; border: 1px solid var(--blue, #457B9D); color: var(--blue, #457B9D); }
.tbl-btn-remove { background: none; border: 1px solid var(--border, #222); color: var(--dim, #555); }
.tbl-empty { text-align: center; color: var(--dim, #555); padding: 24px; font-size: 13px; }
.pagination { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
.pagination button { background: none; border: 1px solid var(--border, #222); border-radius: 6px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 16px; cursor: pointer; }
.pagination button:disabled { opacity: 0.35; cursor: default; }
.pagination span { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--dim, #555); }

/* ── Sessions split view ────────────────────────────────────────────────────── */
.sessions-split { display: flex; gap: 0; min-height: calc(100vh - 64px - 120px); }
.lib-panel { width: 360px; flex-shrink: 0; border-right: 1px solid var(--border, #222); overflow-y: auto; padding-right: 24px; }
.builder-panel { flex: 1; min-width: 0; padding-left: 24px; overflow-y: auto; }
.lib-tabs { display: flex; gap: 0; border: 1px solid var(--border, #222); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
.lib-tab { flex: 1; padding: 10px 6px; background: none; border: none; color: var(--dim, #555); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.lib-tab.active { background: var(--accent, #E63946); color: #fff; }
.lib-card { background: #141414; border: 1px solid var(--border, #222); border-radius: 8px; padding: 14px; margin-bottom: 8px; }
.lib-card-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.lib-card-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #f0f0f0; }
.lib-card-meta { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--dim, #555); margin-bottom: 10px; }
.lib-card-btns { display: flex; gap: 6px; }
.lib-btn { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.12s; }
.lib-btn-edit { background: none; border: 1px solid var(--border, #222); color: var(--muted, #888); }
.lib-btn-edit:hover { border-color: var(--accent, #E63946); color: var(--accent, #E63946); }
.lib-btn-dup { background: none; border: 1px solid var(--border, #222); color: var(--muted, #888); }
.lib-btn-arc { background: none; border: 1px solid var(--border, #222); color: var(--dim, #555); }
.lib-btn-restore { background: none; border: 1px solid var(--green, #2ECC71); color: var(--green, #2ECC71); }
.lib-empty { color: var(--dim, #555); font-size: 13px; padding: 16px 0; }
.vis-pill { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; white-space: nowrap; display: inline-block; }
.vis-sgpt { background: rgba(230,168,23,0.2); color: var(--gold, #E6A817); }
.vis-pt121 { background: rgba(69,123,157,0.2); color: var(--blue, #457B9D); }

/* ── Session builder ────────────────────────────────────────────────────────── */
.builder-hd { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--dim, #555); margin-bottom: 16px; text-transform: uppercase; }
.builder-body { max-width: 560px; }
.vis-toggle { display: flex; gap: 0; border: 1px solid var(--border, #222); border-radius: 6px; overflow: hidden; }
.vis-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--dim, #555); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
.vis-btn.active { background: var(--accent, #E63946); color: #fff; }
.sb-lbl { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); }
.sb-name-inp { width: 100%; height: 52px; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 0 16px; outline: none; margin-top: 6px; margin-bottom: 16px; }
.sb-name-inp:focus { border-color: var(--accent, #E63946); }
.sb-sel { background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 8px 12px; outline: none; cursor: pointer; -webkit-appearance: none; }
.sb-ex-row { background: #141414; border: 1px solid var(--border, #222); border-radius: 8px; padding: 14px; margin-bottom: 8px; }
.sb-ex-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sb-ex-name-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #f0f0f0; }
.sb-remove-btn { background: none; border: 1px solid var(--border, #222); border-radius: 6px; color: var(--muted, #888); font-size: 18px; cursor: pointer; padding: 2px 10px; line-height: 1.4; }
.ex-type-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.ex-type-pill { background: none; border: 1px solid var(--border, #222); border-radius: 20px; color: var(--dim, #555); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; padding: 4px 12px; cursor: pointer; transition: all 0.12s; }
.ex-type-pill.active { background: var(--accent, #E63946); border-color: var(--accent, #E63946); color: #fff; }
.sb-ex-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.sb-field { display: flex; flex-direction: column; }
.sb-num-inp { width: 72px; height: 40px; background: #252525; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 15px; text-align: center; padding: 0 8px; outline: none; }
.sb-note-inp { width: 100%; height: 36px; background: #252525; border: 1px solid var(--border, #222); border-radius: 6px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 0 10px; outline: none; }
.sb-no-ex { color: var(--dim, #555); font-size: 13px; padding: 12px 0; }
.sb-add-btn { width: 100%; height: 48px; background: none; border: 1px solid var(--border, #222); border-radius: 8px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-bottom: 16px; transition: all 0.12s; }
.sb-add-btn:hover { border-color: var(--accent, #E63946); color: var(--accent, #E63946); }
.sb-cancel-btn { width: 100%; height: 48px; background: none; border: 1px solid var(--border, #222); border-radius: 8px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.admin-save-btn { display: block; width: 100%; height: 52px; background: var(--accent, #E63946); border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: #fff; cursor: pointer; transition: opacity 0.15s; }
.admin-save-btn:disabled { opacity: 0.45; cursor: default; }
.pt121-checklist { background: #1a1a1a; border: 1px solid var(--border, #222); border-radius: 6px; padding: 8px 12px; max-height: 200px; overflow-y: auto; margin-top: 6px; margin-bottom: 16px; }
.member-check-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted, #888); cursor: pointer; border-bottom: 1px solid var(--border2, #1a1a1a); }
.member-check-row:last-child { border-bottom: none; }
.member-check-row input { width: 16px; height: 16px; accent-color: var(--accent, #E63946); cursor: pointer; flex-shrink: 0; }
.sgpt-tag { color: var(--gold, #E6A817); font-size: 11px; }
.pt121-tag { color: var(--blue, #457B9D); font-size: 11px; }

/* ── Assignments ────────────────────────────────────────────────────────────── */
.assignments-split { display: flex; gap: 0; }
.assign-form-panel { width: 360px; flex-shrink: 0; padding-right: 24px; border-right: 1px solid var(--border, #222); }
.assign-hist-panel { flex: 1; min-width: 0; padding-left: 24px; }
.assign-hist-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.refresh-btn { background: none; border: none; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
.admin-select { width: 100%; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; margin-top: 6px; margin-bottom: 16px; -webkit-appearance: none; cursor: pointer; }
.admin-date-inp { width: 100%; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; margin-top: 6px; margin-bottom: 16px; color-scheme: dark; }
.send-toggle { display: flex; gap: 0; border: 1px solid var(--border, #222); border-radius: 6px; overflow: hidden; margin-top: 6px; margin-bottom: 14px; }
.send-opt { flex: 1; padding: 10px 6px; background: none; border: none; color: var(--dim, #555); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.send-opt.on { background: var(--accent, #E63946); color: #fff; }
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border, #222); }
.hist-table td { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted, #888); padding: 10px 10px; border-bottom: 1px solid var(--border2, #1a1a1a); vertical-align: top; }
.hist-done { color: var(--green, #2ECC71); font-weight: 600; }
.hist-expired { color: var(--accent, #E63946); }
.hist-pending { color: var(--dim, #555); }

/* ── Settings ───────────────────────────────────────────────────────────────── */
.settings-card { background: #111; border: 1px solid var(--border, #222); border-radius: 10px; padding: 24px; margin-bottom: 24px; max-width: 640px; }
.settings-card-ttl { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #f0f0f0; margin-bottom: 4px; }
.settings-card-sub { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--dim, #555); margin-bottom: 16px; }
.admin-textarea { width: 100%; min-height: 100px; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 6px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; padding: 12px; resize: vertical; outline: none; margin-top: 6px; margin-bottom: 6px; }
.admin-textarea:focus { border-color: var(--accent, #E63946); }
.admin-charcount { font-size: 12px; color: var(--dim, #555); text-align: right; margin-bottom: 14px; }
.preview-label { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim, #555); margin-bottom: 8px; margin-top: 4px; }
.teaser-preview { background: #1a1a1a; border: 1px solid var(--border, #222); border-radius: 8px; padding: 16px; min-height: 56px; }
.tp-heading { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: #f0f0f0; margin-bottom: 6px; }
.tp-body { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted, #888); line-height: 1.6; margin-bottom: 10px; }
.tp-link { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--dim, #555); }
.tp-link a { color: var(--accent, #E63946); text-decoration: none; }

/* ── Exercise search overlay ────────────────────────────────────────────────── */
.sb-search-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9000; display: none; flex-direction: column; padding: 32px 24px 24px; max-width: 560px; margin: 0 auto; left: 0; right: 0; }
.sb-search-overlay.show { display: flex; }
.sb-search-inp { width: 100%; height: 52px; background: #1e1e1e; border: 1px solid var(--border, #222); border-radius: 8px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 0 16px; outline: none; margin-bottom: 12px; flex-shrink: 0; }
.sb-search-inp:focus { border-color: var(--accent, #E63946); }
.sb-search-results { flex: 1; overflow-y: auto; }
.sb-search-item { padding: 14px 4px; border-bottom: 1px solid var(--border2, #1a1a1a); font-family: 'DM Sans', sans-serif; font-size: 15px; color: #f0f0f0; cursor: pointer; }
.sb-search-item:hover { color: var(--accent, #E63946); }
.sb-search-cancel { width: 100%; height: 52px; background: none; border: 1px solid var(--border, #222); border-radius: 8px; color: var(--muted, #888); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; flex-shrink: 0; }

/* ── Toast ──────────────────────────────────────────────────────────────────── */
.admin-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green, #2ECC71); color: #000; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 28px; border-radius: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 9999; }
.admin-toast.show { opacity: 1; }
.admin-toast.err { background: var(--accent, #E63946); color: #fff; }
</style>
</head>
<body>

<div id="admin-gate">Checking access…</div>

<div id="admin-shell" style="display:none">
  <header id="admin-header">
    <div class="header-logo">8RB ADMIN</div>
    <div class="header-right">
      <span class="header-coach" id="admin-coach-name"></span>
      <button class="header-signout" onclick="adminSignOut()">SIGN OUT</button>
    </div>
  </header>

  <div id="admin-body">
    <nav id="admin-sidebar">
      <button class="nav-item active" id="nav-dashboard" onclick="showSection('dashboard')">Dashboard</button>
      <button class="nav-item" id="nav-members" onclick="showSection('members')">Members</button>
